<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>UniMind · Sign in</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script>tailwind.config = { theme: { extend: { colors: { primary: "#7c3aed" }, fontFamily: { display: ["Inter", "sans-serif"] } } } };</script>
  <style>body { font-family: 'Inter', sans-serif; } .glass { background: rgba(124, 58, 237, 0.25); backdrop-filter: blur(12px); border: 1px solid rgba(167, 139, 250, 0.3); }</style>
  <script src="auth.js"></script>
  <script src="web-access.js"></script>
</head>
<body class="bg-purple-950 text-slate-50 antialiased">
  <nav class="fixed top-0 w-full z-50 px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between glass rounded-full px-6 py-3">
      <div class="flex items-center space-x-2">
        <div class="bg-white p-1.5 rounded-lg"><span class="material-symbols-outlined text-primary text-xl font-bold">auto_awesome</span></div>
        <a href="index.html" class="text-xl font-extrabold text-white">UniMind</a>
      </div>
      <div class="flex items-center space-x-4">
        <a class="text-sm font-semibold text-white/80 hover:text-white" href="signup.html">Create account</a>
        <a class="bg-white text-primary px-5 py-2.5 rounded-full text-sm font-bold" href="dashboard.html">Dashboard</a>
      </div>
    </div>
  </nav>
  <main class="pt-28 pb-16 px-6 min-h-screen">
    <div class="max-w-md mx-auto space-y-6">
      <h1 class="text-2xl font-bold">Sign in</h1>
      <p class="text-slate-300">Use the same account as the UniMind app.</p>
      <input id="signin-email" type="email" placeholder="Email" class="w-full rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 text-white placeholder-slate-500" />
      <input id="signin-password" type="password" placeholder="Password" class="w-full rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 text-white placeholder-slate-500" />
      <a href="forgot-password.html" class="block text-sm text-primary hover:underline">Forgot password?</a>
      <button onclick="unimindWebLogin()" class="w-full rounded-xl bg-primary py-3 font-semibold">Continue</button>
      <a href="welcome.html" class="inline-block text-sm text-slate-400 hover:text-white">← Welcome</a>
    </div>
  </main>
  <script>
    async function unimindWebLogin() {
      const email = document.getElementById("signin-email").value.trim().toLowerCase();
      const password = document.getElementById("signin-password").value;
      if (!email || !password) {
        alert("Please enter email and password.");
        return;
      }
      try {
        const res = await fetch(window.UNIMIND_API_BASE + "/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok || !data.success) {
          alert(data.message || "Login failed. Please try again.");
          return;
        }
        const userId = data.user && data.user.id;
        unimindMarkLoggedIn(userId);
        window.location.href = "dashboard.html";
      } catch (e) {
        console.error(e);
        var hint = window.location.protocol === "file:"
          ? "\n\nYou opened this page as a FILE (C:\\... in the address bar).\nUse serve.bat → http://127.0.0.1:8765/signin.html\n(See website\\README_LOCAL.md)"
          : "\n\nCheck: api_server is running (python app.py), XAMPP MySQL is on, and open http://127.0.0.1:5000/health in the browser.";
        alert("Unable to reach UniMind server." + hint);
      }
    }
  </script>
</body>
</html>
