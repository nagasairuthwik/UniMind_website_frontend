<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>UniMind · Forgot password</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet" />
  <script>tailwind.config = { theme: { extend: { colors: { primary: "#7c3aed" }, fontFamily: { display: ["Inter", "sans-serif"] } } } };</script>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-purple-950 text-slate-50 antialiased">
  <nav class="fixed top-0 w-full z-50 px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <a href="index.html" class="text-xl font-extrabold text-white">UniMind</a>
      <a href="signin.html" class="text-sm text-white/80 hover:text-white">Back to sign in</a>
    </div>
  </nav>
  <main class="pt-28 pb-16 px-6 min-h-screen">
    <div class="max-w-md mx-auto space-y-6">
      <h1 class="text-2xl font-bold">Forgot password</h1>
      <input type="email" placeholder="Email" class="w-full rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 text-white placeholder-slate-500" />
      <button onclick="location.href='forgot-password-otp.html'" class="w-full rounded-xl bg-primary py-3 font-semibold">Send OTP</button>
      <a href="signin.html" class="inline-block text-sm text-slate-400 hover:text-white">← Sign in</a>
    </div>
  </main>
</body>
</html>
