<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>UniMind · Profile setup</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script>tailwind.config = { theme: { extend: { colors: { primary: "#7c3aed" }, fontFamily: { display: ["Inter", "sans-serif"] } } } };</script>
  <style>body { font-family: 'Inter', sans-serif; } .glass { background: rgba(124, 58, 237, 0.25); backdrop-filter: blur(12px); border: 1px solid rgba(167, 139, 250, 0.3); } .app-bg { background: linear-gradient(180deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%); }</style>
</head>
<body class="app-bg min-h-screen text-slate-50 antialiased">
  <nav class="fixed top-0 w-full z-50 px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between glass rounded-full px-6 py-3">
      <div class="flex items-center space-x-2">
        <div class="bg-white p-1.5 rounded-lg"><span class="material-symbols-outlined text-primary text-xl font-bold">auto_awesome</span></div>
        <a href="index.html" class="text-xl font-extrabold text-white">UniMind</a>
      </div>
      <a href="signup.html" class="text-sm text-white/80 hover:text-white">Back</a>
    </div>
  </nav>
  <main class="pt-28 pb-16 px-6 min-h-screen">
    <div class="max-w-md mx-auto space-y-8">
      <div class="text-center">
        <h1 class="text-3xl font-bold text-white">Profile setup</h1>
        <p class="text-slate-300 mt-2">Tell us a bit about you so UniMind can personalize your experience.</p>
      </div>
      <div class="flex justify-center">
        <div class="w-24 h-24 rounded-full bg-purple-700/50 border-2 border-purple-500/50 flex items-center justify-center">
          <span class="material-symbols-outlined text-4xl text-white/70">person</span>
        </div>
      </div>
      <div class="space-y-4">
        <label class="block text-sm font-medium text-slate-300">Display name</label>
        <input type="text" placeholder="How should we call you?" class="w-full rounded-xl bg-purple-900/50 border border-purple-500/30 px-4 py-3 text-white placeholder-slate-400 focus:ring-2 focus:ring-primary focus:border-transparent" />
      </div>
      <div class="space-y-4">
        <label class="block text-sm font-medium text-slate-300">Date of birth (optional)</label>
        <input type="date" class="w-full rounded-xl bg-purple-900/50 border border-purple-500/30 px-4 py-3 text-white focus:ring-2 focus:ring-primary focus:border-transparent" />
      </div>
      <div class="space-y-4">
        <label class="block text-sm font-medium text-slate-300">Gender (optional)</label>
        <select class="w-full rounded-xl bg-purple-900/50 border border-purple-500/30 px-4 py-3 text-white focus:ring-2 focus:ring-primary focus:border-transparent">
          <option value="">Prefer not to say</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
      </div>
      <button onclick="location.href='domain-selection.html'" class="w-full rounded-xl bg-primary hover:bg-violet-600 py-3.5 font-semibold text-white transition-colors">Continue → Choose domains</button>
      <a href="signup.html" class="inline-block text-sm text-slate-400 hover:text-white">← Back to Sign up</a>
    </div>
  </main>
</body>
</html>
