<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>UniMind · Add expense</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet" />
  <script>tailwind.config = { theme: { extend: { colors: { primary: "#7c3aed" }, fontFamily: { display: ["Inter", "sans-serif"] } } } };</script>
  <style>body { font-family: 'Inter', sans-serif; } .glass { background: rgba(124, 58, 237, 0.25); backdrop-filter: blur(12px); border: 1px solid rgba(167, 139, 250, 0.3); }</style>
</head>
<body class="bg-purple-950 text-slate-50 antialiased">
  <nav class="fixed top-0 w-full z-50 px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between glass rounded-full px-6 py-3">
      <div class="flex items-center space-x-2"><div class="bg-white p-1.5 rounded-lg"><span class="material-symbols-outlined text-primary text-xl font-bold">auto_awesome</span></div><a href="index.html" class="text-xl font-extrabold text-white">UniMind</a></div>
      <div class="hidden md:flex items-center space-x-6 text-sm"><a class="text-white/70 hover:text-white" href="dashboard.html">Dashboard</a><a class="text-white/70 hover:text-white" href="finance.html">Finance</a></div>
      <a href="ai-chat.html" class="bg-white text-primary px-5 py-2.5 rounded-full text-sm font-bold">Open AI</a>
    </div>
  </nav>
  <main class="pt-28 pb-16 px-6 min-h-screen">
    <div class="max-w-md mx-auto space-y-6">
      <h1 class="text-2xl font-bold">Add expense</h1>
      <p class="text-slate-300">Log a new expense. Mirrors AddExpenseActivity.</p>
      <input type="text" placeholder="Category" class="w-full rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 text-white placeholder-slate-500" />
      <input type="number" placeholder="Amount" class="w-full rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 text-white placeholder-slate-500" />
      <button onclick="location.href='finance.html'" class="w-full rounded-xl bg-primary py-3 font-semibold">Save</button>
      <a href="finance.html" class="inline-block text-sm text-slate-400 hover:text-white">Back to Finance</a>
    </div>
  </main>
</body>
</html>
