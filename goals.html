<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>UniMind · Set your goals</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script>tailwind.config = { theme: { extend: { colors: { primary: "#7c3aed" }, fontFamily: { display: ["Inter", "sans-serif"] } } } };</script>
  <style>body { font-family: 'Inter', sans-serif; } .glass { background: rgba(124, 58, 237, 0.25); backdrop-filter: blur(12px); border: 1px solid rgba(167, 139, 250, 0.3); } .app-bg { background: linear-gradient(180deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%); }</style>
</head>
<body class="app-bg min-h-screen text-slate-50 antialiased">
  <nav class="fixed top-0 w-full z-50 px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between glass rounded-full px-6 py-3">
      <div class="flex items-center space-x-2">
        <div class="bg-white p-1.5 rounded-lg"><span class="material-symbols-outlined text-primary text-xl font-bold">auto_awesome</span></div>
        <a href="index.html" class="text-xl font-extrabold text-white">UniMind</a>
      </div>
      <a href="domain-selection.html" class="text-sm text-white/80 hover:text-white">Back</a>
    </div>
  </nav>
  <main class="pt-28 pb-16 px-6 min-h-screen">
    <div class="max-w-lg mx-auto space-y-8">
      <div class="text-center">
        <h1 class="text-3xl font-bold text-white">Set your goals</h1>
        <p class="text-slate-300 mt-2">Add quick goals per domain. You can add more later from the app.</p>
      </div>
      <div class="space-y-6">
        <div class="p-4 rounded-2xl bg-purple-900/30 border border-purple-500/30">
          <label class="block text-sm font-medium text-slate-300 mb-2">Health goal</label>
          <input type="text" placeholder="e.g. Walk 8,000 steps daily" class="w-full rounded-xl bg-purple-900/50 border border-purple-500/30 px-4 py-3 text-white placeholder-slate-400 focus:ring-2 focus:ring-primary focus:border-transparent" />
        </div>
        <div class="p-4 rounded-2xl bg-purple-900/30 border border-purple-500/30">
          <label class="block text-sm font-medium text-slate-300 mb-2">Finance goal</label>
          <input type="text" placeholder="e.g. Save ₹5,000 per month" class="w-full rounded-xl bg-purple-900/50 border border-purple-500/30 px-4 py-3 text-white placeholder-slate-400 focus:ring-2 focus:ring-primary focus:border-transparent" />
        </div>
        <div class="p-4 rounded-2xl bg-purple-900/30 border border-purple-500/30">
          <label class="block text-sm font-medium text-slate-300 mb-2">Productivity goal</label>
          <input type="text" placeholder="e.g. Complete 3 important tasks daily" class="w-full rounded-xl bg-purple-900/50 border border-purple-500/30 px-4 py-3 text-white placeholder-slate-400 focus:ring-2 focus:ring-primary focus:border-transparent" />
        </div>
        <div class="p-4 rounded-2xl bg-purple-900/30 border border-purple-500/30">
          <label class="block text-sm font-medium text-slate-300 mb-2">Lifestyle goal</label>
          <input type="text" placeholder="e.g. Sleep by 11 PM, 7 hours" class="w-full rounded-xl bg-purple-900/50 border border-purple-500/30 px-4 py-3 text-white placeholder-slate-400 focus:ring-2 focus:ring-primary focus:border-transparent" />
        </div>
      </div>
      <button onclick="location.href='all-set.html'" class="w-full rounded-xl bg-primary hover:bg-violet-600 py-3.5 font-semibold text-white transition-colors">Continue → All set</button>
      <a href="domain-selection.html" class="inline-block text-sm text-slate-400 hover:text-white">← Back to Domains</a>
    </div>
  </main>
</body>
</html>
