<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>UniMind · Choose domains</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script>tailwind.config = { theme: { extend: { colors: { primary: "#7c3aed" }, fontFamily: { display: ["Inter", "sans-serif"] } } } };</script>
  <style>body { font-family: 'Inter', sans-serif; } .glass { background: rgba(124, 58, 237, 0.25); backdrop-filter: blur(12px); border: 1px solid rgba(167, 139, 250, 0.3); } .app-bg { background: linear-gradient(180deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%); } .domain-card { transition: all 0.2s; } .domain-card:has(input:checked) { border-color: rgb(124, 58, 237); background: rgba(124, 58, 237, 0.15); }</style>
</head>
<body class="app-bg min-h-screen text-slate-50 antialiased">
  <nav class="fixed top-0 w-full z-50 px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between glass rounded-full px-6 py-3">
      <div class="flex items-center space-x-2">
        <div class="bg-white p-1.5 rounded-lg"><span class="material-symbols-outlined text-primary text-xl font-bold">auto_awesome</span></div>
        <a href="index.html" class="text-xl font-extrabold text-white">UniMind</a>
      </div>
      <a href="profile-setup.html" class="text-sm text-white/80 hover:text-white">Back</a>
    </div>
  </nav>
  <main class="pt-28 pb-16 px-6 min-h-screen">
    <div class="max-w-lg mx-auto space-y-8">
      <div>
        <h1 class="text-2xl font-bold text-white">Choose Domains</h1>
        <p class="text-slate-300 mt-2 text-lg font-semibold">What interests you?</p>
        <p class="text-slate-400 mt-1">Select the areas where you want AI assistance (select multiple)</p>
      </div>
      <div class="grid gap-3">
        <label class="domain-card flex items-center gap-4 p-4 rounded-2xl border-2 border-purple-500/30 bg-purple-900/30 cursor-pointer">
          <input type="checkbox" checked class="rounded border-purple-400 text-primary focus:ring-primary w-5 h-5" />
          <span class="material-symbols-outlined text-3xl text-primary">favorite</span>
          <span class="font-semibold text-white">Health &amp; Fitness</span>
        </label>
        <label class="domain-card flex items-center gap-4 p-4 rounded-2xl border-2 border-purple-500/30 bg-purple-900/30 cursor-pointer">
          <input type="checkbox" checked class="rounded border-purple-400 text-primary focus:ring-primary w-5 h-5" />
          <span class="material-symbols-outlined text-3xl text-primary">task_alt</span>
          <span class="font-semibold text-white">Productivity</span>
        </label>
        <label class="domain-card flex items-center gap-4 p-4 rounded-2xl border-2 border-purple-500/30 bg-purple-900/30 cursor-pointer">
          <input type="checkbox" checked class="rounded border-purple-400 text-primary focus:ring-primary w-5 h-5" />
          <span class="material-symbols-outlined text-3xl text-primary">savings</span>
          <span class="font-semibold text-white">Finance</span>
        </label>
        <label class="domain-card flex items-center gap-4 p-4 rounded-2xl border-2 border-purple-500/30 bg-purple-900/30 cursor-pointer">
          <input type="checkbox" checked class="rounded border-purple-400 text-primary focus:ring-primary w-5 h-5" />
          <span class="material-symbols-outlined text-3xl text-primary">self_improvement</span>
          <span class="font-semibold text-white">Lifestyle</span>
        </label>
      </div>
      <button onclick="location.href='goals.html'" class="w-full rounded-xl bg-primary hover:bg-violet-600 py-3.5 font-semibold text-white transition-colors">Continue (4 selected)</button>
      <a href="profile-setup.html" class="inline-block text-sm text-slate-400 hover:text-white">← Back to Profile setup</a>
    </div>
  </main>
</body>
</html>
