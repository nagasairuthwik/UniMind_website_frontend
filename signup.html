<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>UniMind · Sign up</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <script>tailwind.config = { theme: { extend: { colors: { primary: "#7c3aed" }, fontFamily: { display: ["Inter", "sans-serif"] } } } };</script>
  <style>body { font-family: 'Inter', sans-serif; } .glass { background: rgba(124, 58, 237, 0.25); backdrop-filter: blur(12px); border: 1px solid rgba(167, 139, 250, 0.3); } .app-bg { background: linear-gradient(180deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%); }</style>
  <script src="auth.js"></script>
  <script src="web-access.js"></script>
</head>
<body class="app-bg min-h-screen text-slate-50 antialiased">
  <nav class="fixed top-0 w-full z-50 px-6 py-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between glass rounded-full px-6 py-3">
      <div class="flex items-center space-x-2">
        <div class="bg-white p-1.5 rounded-lg"><span class="material-symbols-outlined text-primary text-xl font-bold">auto_awesome</span></div>
        <a href="index.html" class="text-xl font-extrabold text-white">UniMind</a>
      </div>
      <div class="flex items-center space-x-4">
        <a class="text-sm font-semibold text-white/80 hover:text-white" href="signin.html">Log in</a>
      </div>
    </div>
  </nav>
  <main class="pt-28 pb-16 px-6 min-h-screen">
    <div class="max-w-md mx-auto space-y-6">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white">Create your account</h1>
        <p class="text-slate-300 mt-2">Join UniMind to track health, finance, productivity and lifestyle in one place.</p>
      </div>
      <div class="space-y-4">
        <label class="block text-sm font-medium text-slate-300">Full name</label>
        <input id="signup-name" type="text" placeholder="Enter your name" class="w-full rounded-xl bg-purple-900/50 border border-purple-500/30 px-4 py-3 text-white placeholder-slate-400 focus:ring-2 focus:ring-primary focus:border-transparent" />
      </div>
      <div class="space-y-4">
        <label class="block text-sm font-medium text-slate-300">Email</label>
        <input id="signup-email" type="email" placeholder="you@example.com" class="w-full rounded-xl bg-purple-900/50 border border-purple-500/30 px-4 py-3 text-white placeholder-slate-400 focus:ring-2 focus:ring-primary focus:border-transparent" />
      </div>
      <div class="space-y-4">
        <label class="block text-sm font-medium text-slate-300">Password</label>
        <input id="signup-password" type="password" placeholder="Min 8 characters" class="w-full rounded-xl bg-purple-900/50 border border-purple-500/30 px-4 py-3 text-white placeholder-slate-400 focus:ring-2 focus:ring-primary focus:border-transparent" />
        <p class="text-xs text-slate-400">Use a mix of letters and numbers for security.</p>
      </div>
      <button onclick="unimindWebSignup()" class="w-full rounded-xl bg-primary hover:bg-violet-600 py-3.5 font-semibold text-white transition-colors">Continue → Profile setup</button>
      <p class="text-center text-sm text-slate-400">Already have an account? <a href="signin.html" class="text-primary hover:underline">Log in</a></p>
      <a href="welcome.html" class="inline-block text-sm text-slate-400 hover:text-white">← Back to Welcome</a>
    </div>
  </main>
  <script>
    async function unimindWebSignup() {
      const fullName = document.getElementById("signup-name").value.trim();
      const email = document.getElementById("signup-email").value.trim().toLowerCase();
      const password = document.getElementById("signup-password").value;
      if (!fullName || !email || !password) {
        alert("Please fill in name, email and password.");
        return;
      }
      try {
        const res = await fetch(window.UNIMIND_API_BASE + "/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ full_name: fullName, email, password })
        });
        const data = await res.json();
        if (!res.ok || !data.success) {
          alert(data.message || "Signup failed. Please try again.");
          return;
        }
        const userId = data.user && data.user.id;
        unimindMarkLoggedIn(userId);
        window.location.href = "profile-setup.html";
      } catch (e) {
        console.error(e);
        var hint = window.location.protocol === "file:"
          ? "\n\nYou opened this page as a FILE (C:\\... in the address bar).\nUse serve.bat → http://127.0.0.1:8765/signup.html\n(See website\\README_LOCAL.md)"
          : "\n\nCheck: api_server is running (python app.py), XAMPP MySQL is on, and open http://127.0.0.1:5000/health in the browser.";
        alert("Unable to reach UniMind server." + hint);
      }
    }
  </script>
</body>
</html>
